<div class="register-overlay" (click)="closeRegisterPopup()">
  <div class="register-popup" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeRegisterPopup()">✖</button>
    <h2>{{'registreren.registreren' | translate}}</h2>

    <form (submit)="RoepREgisterAAn()">
      <label for="register-email">E-mail</label>
      <input type="email" id="register-email" [(ngModel)]="registerEmail" [ngModelOptions]="{standalone: true}" required>

      <label for="register-password">{{'registreren.wachtwoord' | translate}}</label>
      <input type="password" id="register-password" [(ngModel)]="registerPassword" [ngModelOptions]="{standalone: true}" required>

      <button type="submit" class="register-btn">{{'registreren.registreren' | translate}}</button>
    </form>
  </div>
</div>
