<div class="change-data-container">
  <h2>{{'aanpassen.product' | translate}}</h2>

  <form (ngSubmit)="addproductData()">
    <div class="form-group">
      <label for="product">{{'aanpassen.naam' | translate}}</label>
      <select id="product" name="product" [(ngModel)]="changeproduct" [ngModelOptions]="{standalone: true}"
        (change)="gekozenProductData()">
        @for (product of products(); track product.productNummer){
        <option [value]="product.productNummer">{{product.productName}}</option>
        @for(variant of product.productVariants; track variant.productNummer){
        <option [value]="product.productNummer + '/' + variant.productNummer">{{variant.productName}}</option>
        }
        }
      </select>
    </div>

    @if (this.changeproduct) {
    <div class="form-group">
      <p class="section-title">{{'aanpassen.gegevens' | translate}}</p>

      <label>{{'aanpassen.naam' | translate}}</label>
      <input type="text" [(ngModel)]="gekozenProductName" [ngModelOptions]="{standalone: true}">
    </div>

    <div class="form-group">
      <label>{{'aanpassen.beschrijving' | translate}}</label>
      <input [(ngModel)]="gekozenProductBeschrijving" [ngModelOptions]="{standalone: true}">
    </div>

    <div class="form-group">
      <label>{{'aanpassen.prijs' | translate}}</label>
      <input type="number" [(ngModel)]="gekozenProductPrijs" [ngModelOptions]="{standalone: true}">
    </div>

    <div class="form-group">
      <label for="category">{{'aanpassen.categorie' | translate}}</label>
      <select id="category" name="categorie" [(ngModel)]="gekozenProductCategory" [ngModelOptions]="{standalone: true}">
        <option value="Horloges">{{'toevoegen.categories-lijst.watches' | translate}}</option>
        <option value="Armbanden">{{'toevoegen.categories-lijst.bracelets' | translate}}</option>
        <option value="Tassen">{{'toevoegen.categories-lijst.bags' | translate}}</option>
        <option value="Brillen">{{'toevoegen.categories-lijst.glasses' | translate}}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="image">{{'toevoegen.afbeelding' | translate}}</label>
      <input id="image" [(ngModel)]="gekozenProductIMG" [ngModelOptions]="{standalone: true}">
      <img [src]="'/assets/' + gekozenProductIMG + '.png'" class="preview">
    </div>

    <div class="form-group">
      <label for="color">Color</label>
      <div style="display: flex;">
        <input id="color" type="color" [(ngModel)]="gekozenProductColor" [ngModelOptions]="{standalone: true}">
        <input id="color" [(ngModel)]="gekozenProductColor" [ngModelOptions]="{standalone: true}">
      </div>
    </div>

    <div class="button-group">
      <button type="submit" class="submit-btn">{{'aanpassen.opslaan' | translate}}</button>
    </div>
    }
  </form>
</div>
